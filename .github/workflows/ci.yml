name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6


      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Run tests and verify coverage
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew :app:checkCoverageBaseline

      - name: Update and Push Coverage Baseline
        if: github.ref == 'refs/heads/main'
        run: |
          if [[ -n $(git status --porcelain .github/coverage-baseline.txt) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/coverage-baseline.txt
            git commit -m "chore: update coverage baseline [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "No changes in coverage baseline."
          fi

      - name: Check commit message for release criteria
        if: github.ref == 'refs/heads/main'
        id: check_commit
        run: |
          commit_msg=$(git log -1 --pretty=%B)
          echo "Commit message:"
          echo "$commit_msg"
          if echo "$commit_msg" | grep -qE '^(feat|fix|refactor)(\(.*\))?(\!)?:'; then
            echo "should_release=true" >> $GITHUB_ENV
            echo "Matches release criteria (feat/fix/refactor)."
          else
            echo "should_release=false" >> $GITHUB_ENV
            echo "Does not match release criteria."
          fi

      - name: Build productive release APK
        if: github.ref == 'refs/heads/main' && env.should_release == 'true'
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew :app:assembleRelease

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && env.should_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
